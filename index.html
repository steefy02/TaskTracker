<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #171717;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --text-muted: #6b6560;
    --accent: #c9a96e;
    --accent2: #8b7355;

    --done: #4caf6e;
    --almost-done: #a8c96e;
    --half: #e8b84b;
    --little: #e87d3e;
    --not-started: #e8503e;
    --not-started-border: #e8503e;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 20px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .legend {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .bubble-sm {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }

  .add-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  .save-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-indicator.visible { opacity: 1; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    z-index: 999;
    animation: toastIn 0.2s ease;
    pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  main {
    flex: 1;
    padding: 28px 40px;
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }

  /* Task Card */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .task-card:hover { border-color: #3a3a3a; }

  .task-card.dragging { opacity: 0.4; }

  .task-card.drag-over { border-color: var(--accent); }

  .drag-handle {
    color: var(--text-muted);
    cursor: grab;
    padding: 0 2px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .task-card:hover .drag-handle { opacity: 1; }
  
  .drag-handle:active { cursor: grabbing; }

  .task-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .bubble {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.2s;
    cursor: pointer;
  }

  .task-title {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  .task-deadline, .subtask-deadline {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .task-deadline.dl-blue, .subtask-deadline.dl-blue { color: #6aabdc; }
  .task-deadline.dl-green, .subtask-deadline.dl-green { color: #4caf6e; }
  .task-deadline.dl-yellow, .subtask-deadline.dl-yellow { color: #e8b84b; }
  .task-deadline.dl-orange, .subtask-deadline.dl-orange { color: #e87d3e; }
  .task-deadline.dl-red, .subtask-deadline.dl-red { color: #e8503e; }
  .task-deadline.dl-overdue, .subtask-deadline.dl-overdue { color: #e8503e; font-style: italic; }

  footer {
    border-top: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  footer .legend-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: nowrap;
  }
  footer .legend-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;

  }
  footer .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  footer .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .chevron {
    font-size: 0.65rem;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-left: 4px;
  }
  .chevron.open { transform: rotate(90deg); }

  .task-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .task-card:hover .task-actions { opacity: 1; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 5px;
    border-radius: 4px;
    font-size: 0.8rem;
    transition: color 0.15s, background 0.15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .icon-btn.delete:hover { color: #e8503e; }

  /* Task Body */
  .task-body {
    padding: 0 16px 14px 41px;
    border-top: 1px solid var(--border);
  }

  .notes-area {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    margin-top: 10px;
    white-space: pre-wrap;
  }

  /* Progress selector */
  .progress-selector {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .progress-label { font-size: 0.7rem; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-right: 4px; }

  .prog-opt {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 0.72rem;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .prog-opt:hover { border-color: #444; color: var(--text); }
  .prog-opt.active { border-color: var(--accent2); color: var(--text); background: rgba(201,169,110,0.07); }

  /* Subtasks */
  .subtasks {
    margin-top: 10px;
  }

  .subtask-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #1c1c1c;
  }
  .subtask-row:last-of-type { border-bottom: none; }

  .subtask-title {
    flex: 1;
    font-size: 0.82rem;
    color: var(--text);
  }

  .subtask-deadline {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
  }

  .subtask-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .subtask-row:hover .subtask-actions { opacity: 1; }

  .add-subtask-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-subtask-btn:hover { border-color: #444; color: var(--text); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    animation: slideUp 0.18s ease;
  }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 0.88rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent2); }
  .field textarea { resize: vertical; min-height: 80px; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: #444; color: var(--text); }

  .btn-save {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  .progress-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }
  .progress-bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
    cursor: pointer;
  }

  .bubble-not-started { background: transparent; border: 2px solid var(--not-started-border); }
  .bubble-little { background: var(--little); }
  .bubble-half { background: var(--half); }
  .bubble-almost { background: var(--almost-done); }
  .bubble-done { background: var(--done); }
</style>
</head>
<body>

<header>
  <h1>Task Tracker</h1>
  <div class="header-right">
    <span class="save-indicator" id="save-indicator">Saved</span>
    <button class="add-btn" onclick="openModal('task')">+ Add Task</button>
  </div>
</header>

<div class="progress-bar-row" id="progress-summary">
  <span id="progress-text">0 / 0 tasks completed</span>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <span id="progress-pct">0%</span>
</div>

<main id="main-content">
  <div class="empty-state">
    <div class="emoji">🗒</div>
    <div>No tasks yet. Add your first task to get started.</div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModalIfOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">Add Task</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="modal-title-input" placeholder="e.g. Literature Review" />
    </div>
    <div class="field">
      <label>Deadline</label>
      <input type="date" id="modal-deadline" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="modal-notes" placeholder="Any additional notes, links, references..."></textarea>
    </div>
    <div class="field">
      <label>Progress</label>
      <select id="modal-progress">
        <option value="not-started">Not started</option>
        <option value="little">Just begun (~25%)</option>
        <option value="half">Halfway (~50%)</option>
        <option value="almost">Almost done (~75%)</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let modalMode = null; // 'task' | 'subtask' | 'edit-task' | 'edit-subtask'
let modalContext = null; // {taskId, subtaskId}
let expandedTasks = new Set();
let saveTimer = null;

// Load from disk
async function load() {
  try { tasks = await window.electronAPI.loadTasks() || []; } catch { tasks = []; }
}

// Debounced auto-save to disk
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const ok = await window.electronAPI.saveTasks(tasks);
    if (ok) {
      const el = document.getElementById('save-indicator');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 1500);
    }
  }, 300);
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function progressClass(p) {
  const map = { 'not-started': 'bubble-not-started', 'little': 'bubble-little', 'half': 'bubble-half', 'almost': 'bubble-almost', 'done': 'bubble-done' };
  return map[p] || 'bubble-not-started';
}

function progressWeight(p) {
  const map = { 'not-started': 0, 'little': 0.25, 'half': 0.5, 'almost': 0.75, 'done': 1 };
  return map[p] || 0;
}

function formatDeadline(d) {
  if (!d) return null;
  const date = new Date(d + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((date - now) / 86400000);
  const label = date.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
  let suffix = '', cls = '';
  if (diff < 0)        { suffix = ' · overdue';                    cls = 'dl-overdue'; }
  else if (diff <= 3)  { suffix = ` · ${diff}d left`;              cls = 'dl-red';     }
  else if (diff <= 7)  { suffix = ` · ${diff}d left`;              cls = 'dl-orange';  }
  else if (diff <= 30) { suffix = ` · ${Math.ceil(diff/7)}w left`; cls = 'dl-yellow';  }
  else if (diff <= 60) { suffix = ` · ${Math.ceil(diff/7)}w left`; cls = 'dl-green';   }
  else                 { suffix = ` · ${Math.ceil(diff/30)}mo left`; cls = 'dl-blue';  }
  return { text: label + suffix, cls };
}

function openModal(mode, taskId, subtaskId) {
  modalMode = mode;
  modalContext = { taskId, subtaskId };
  const overlay = document.getElementById('modal-overlay');
  const t = document.getElementById('modal-title');
  document.getElementById('modal-title-input').value = '';
  document.getElementById('modal-deadline').value = '';
  document.getElementById('modal-notes').value = '';
  document.getElementById('modal-progress').value = 'not-started';

  if (mode === 'task') { t.textContent = 'Add Task'; }
  else if (mode === 'subtask') { t.textContent = 'Add Subtask'; }
  else if (mode === 'edit-task') {
    t.textContent = 'Edit Task';
    const task = tasks.find(x => x.id === taskId);
    if (task) {
      document.getElementById('modal-title-input').value = task.title;
      document.getElementById('modal-deadline').value = task.deadline || '';
      document.getElementById('modal-notes').value = task.notes || '';
      document.getElementById('modal-progress').value = task.progress;
    }
  } else if (mode === 'edit-subtask') {
    t.textContent = 'Edit Subtask';
    const task = tasks.find(x => x.id === taskId);
    const sub = task?.subtasks.find(s => s.id === subtaskId);
    if (sub) {
      document.getElementById('modal-title-input').value = sub.title;
      document.getElementById('modal-deadline').value = sub.deadline || '';
      document.getElementById('modal-notes').value = sub.notes || '';
      document.getElementById('modal-progress').value = sub.progress;
    }
  }
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('modal-title-input').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
function closeModalIfOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function saveModal() {
  const title = document.getElementById('modal-title-input').value.trim();
  if (!title) { document.getElementById('modal-title-input').focus(); return; }
  const deadline = document.getElementById('modal-deadline').value;
  const notes = document.getElementById('modal-notes').value.trim();
  const progress = document.getElementById('modal-progress').value;

  if (modalMode === 'task') {
    tasks.push({ id: Date.now().toString(), title, deadline, notes, progress, subtasks: [] });
  } else if (modalMode === 'subtask') {
    const task = tasks.find(x => x.id === modalContext.taskId);
    if (task) task.subtasks.push({ id: Date.now().toString(), title, deadline, notes, progress });
    expandedTasks.add(modalContext.taskId);
  } else if (modalMode === 'edit-task') {
    const task = tasks.find(x => x.id === modalContext.taskId);
    if (task) Object.assign(task, { title, deadline, notes, progress });
  } else if (modalMode === 'edit-subtask') {
    const task = tasks.find(x => x.id === modalContext.taskId);
    const sub = task?.subtasks.find(s => s.id === modalContext.subtaskId);
    if (sub) Object.assign(sub, { title, deadline, notes, progress });
  }

  save();
  closeModal();
  render();
}

function deleteTask(id) {
  if (!confirm('Delete this task and all its subtasks?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function deleteSubtask(taskId, subId) {
  const task = tasks.find(t => t.id === taskId);
  if (task) task.subtasks = task.subtasks.filter(s => s.id !== subId);
  save(); render();
}

function toggleExpand(id) {
  if (expandedTasks.has(id)) expandedTasks.delete(id);
  else expandedTasks.add(id);
  render();
}

function cycleProgress(type, taskId, subId) {
  const order = ['not-started', 'little', 'half', 'almost', 'done'];
  if (type === 'task') {
    const task = tasks.find(t => t.id === taskId);
    if (task) task.progress = order[(order.indexOf(task.progress) + 1) % order.length];
  } else {
    const task = tasks.find(t => t.id === taskId);
    const sub = task?.subtasks.find(s => s.id === subId);
    if (sub) sub.progress = order[(order.indexOf(sub.progress) + 1) % order.length];
  }
  save(); render();
}

function computeOverallProgress() {
  if (!tasks.length) return { done: 0, total: 0, pct: 0 };
  let sum = 0;
  tasks.forEach(t => {
    if (t.subtasks.length) {
      const subAvg = t.subtasks.reduce((a, s) => a + progressWeight(s.progress), 0) / t.subtasks.length;
      sum += subAvg;
    } else {
      sum += progressWeight(t.progress);
    }
  });
  const pct = Math.round((sum / tasks.length) * 100);
  const done = tasks.filter(t => t.progress === 'done').length;
  return { done, total: tasks.length, pct };
}

function render() {
  const main = document.getElementById('main-content');
  const { done, total, pct } = computeOverallProgress();
  document.getElementById('progress-text').textContent = `${done} / ${total} tasks completed`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  if (!tasks.length) {
    main.innerHTML = `<div class="empty-state"><div class="emoji">🗒</div><div>No tasks yet. Add your first task to get started.</div></div>`;
    return;
  }

  main.innerHTML = tasks.map(task => {
    const expanded = expandedTasks.has(task.id);
    const dl = task.deadline ? formatDeadline(task.deadline) : null;
    const hasBody = task.notes || task.subtasks.length > 0 || expanded;

    const subtasksHTML = task.subtasks.map(sub => {
      const sdl = sub.deadline ? formatDeadline(sub.deadline) : null;
      return `
        <div class="subtask-row">
          <div class="bubble ${progressClass(sub.progress)}" title="Click to cycle progress" onclick="cycleProgress('sub','${task.id}','${sub.id}')"></div>
          <span class="subtask-title">${escHtml(sub.title)}</span>
          ${sdl ? `<span class="subtask-deadline ${sdl.cls}">${escHtml(sdl.text)}</span>` : ''}
          <div class="subtask-actions">
            <button class="icon-btn" onclick="openModal('edit-subtask','${task.id}','${sub.id}')" title="Edit">✎</button>
            <button class="icon-btn delete" onclick="deleteSubtask('${task.id}','${sub.id}')" title="Delete">✕</button>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="task-card" draggable="true" data-id="${task.id}"
      ondragstart="onDragStart(event,'${task.id}')"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,'${task.id}')"
      ondragend="onDragEnd(event)">
        <div class="task-header" onclick="toggleExpand('${task.id}')">
          <span class="drag-handle" onclick="event.stopPropagation()">⠿</span>
          <div class="bubble ${progressClass(task.progress)}" title="Click to cycle progress" onclick="event.stopPropagation();cycleProgress('task','${task.id}')"></div>
          <span class="task-title">${escHtml(task.title)}</span>
          ${dl ? `<span class="task-deadline ${dl.cls}">${escHtml(dl.text)}</span>` : ''}
          <div class="task-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" onclick="openModal('edit-task','${task.id}')" title="Edit">✎</button>
            <button class="icon-btn delete" onclick="deleteTask('${task.id}')" title="Delete">✕</button>
          </div>
          <span class="chevron ${expanded ? 'open' : ''}">▶</span>
        </div>
        ${expanded ? `
        <div class="task-body">
          ${task.notes ? `<div class="notes-area">${escHtml(task.notes)}</div>` : ''}
          ${task.subtasks.length || expanded ? `<div class="subtasks">${subtasksHTML}</div>` : ''}
          <button class="add-subtask-btn" onclick="openModal('subtask','${task.id}')">+ Add subtask</button>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let dragSrcId = null;
function onDragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.task-card').classList.add('dragging'), 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId === targetId) return;
  const srcIdx = tasks.findIndex(t => t.id === dragSrcId);
  const tgtIdx = tasks.findIndex(t => t.id === targetId);
  const [moved] = tasks.splice(srcIdx, 1);
  tasks.splice(tgtIdx, 0, moved);
  save(); render();
}

function onDragEnd(e) {
  dragSrcId = null;
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('dragging', 'drag-over'));
}

load().then(render);
</script>

<footer>
  <div style="display:flex; align-items:center; gap:10px; flex-wrap:nowrap">
    <span class="legend-label">Deadline</span>
    <div class="legend-group">
      <div class="legend-item" style="color:#6aabdc"><div class="dot" style="background:#6aabdc"></div> &gt;2 months</div>
      <div class="legend-item" style="color:#4caf6e"><div class="dot" style="background:#4caf6e"></div> 1–2 months</div>
      <div class="legend-item" style="color:#e8b84b"><div class="dot" style="background:#e8b84b"></div> 1w–1mo</div>
      <div class="legend-item" style="color:#e87d3e"><div class="dot" style="background:#e87d3e"></div> ≤1 week</div>
      <div class="legend-item" style="color:#e8503e"><div class="dot" style="background:#e8503e"></div> ≤3 days / overdue</div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; flex-wrap:nowrap">
    <span class="legend-label">Progress</span>
    <div class="legend-group">
      <div class="legend-item" style="color:#e8503e"><div class="dot" style="background:transparent;border:2px solid #e8503e;box-sizing:border-box"></div> not started</div>
      <div class="legend-item" style="color:#e87d3e"><div class="dot" style="background:#e87d3e"></div> just begun</div>
      <div class="legend-item" style="color:#e8b84b"><div class="dot" style="background:#e8b84b"></div> halfway</div>
      <div class="legend-item" style="color:#a8c96e"><div class="dot" style="background:#a8c96e"></div> almost done</div>
      <div class="legend-item" style="color:#4caf6e"><div class="dot" style="background:#4caf6e"></div> done</div>
    </div>
  </div>
</footer>

</body>
</html>
